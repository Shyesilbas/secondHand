# E-posta şablonları (içerik). Sırlar burada tutulmaz; yalnızca app.email.* metinleri.
app:
  email:
    sender: "${EMAIL_SENDER:secondhand@noreply.com}"
    verification-subject: "${EMAIL_VERIFICATION_SUBJECT:SecondHand - Account Verification Code}"
    verification-content: "${EMAIL_VERIFICATION_CONTENT:Hello %s, please use the following code to verify your SecondHand account: Verification Code: %s. This code is valid for 15 minutes. If you did not request this verification, please ignore this email. Best regards, SecondHand Team}"
    welcome-subject: "${EMAIL_WELCOME_SUBJECT:Welcome to SecondHand!}"
    welcome-content: "${EMAIL_WELCOME_CONTENT:Hello %s, Welcome to SecondHand! Your account has been successfully created. You can now sell your second-hand items, purchase items you like, and communicate safely with other users. Happy shopping! SecondHand Team}"
    phone-update-subject: "${EMAIL_PHONE_UPDATE_SUBJECT:SecondHand - Phone Number Updated}"
    phone-update-content: "${EMAIL_PHONE_UPDATE_CONTENT:Hello %s, your phone number has been updated. If you did not make this change, please contact us immediately.}"
    payment-success-subject: "${EMAIL_PAYMENT_SUCCESS_SUBJECT:SecondHand - Payment Successful}"
    payment-success-content: "${EMAIL_PAYMENT_SUCCESS_CONTENT:Hello %s,\nYour payment for the listing titled '%s' has been successfully processed.\nPayment Details:\nAmount: %s\nTransaction Type: %s\nThank you for using SecondHand!\nBest regards,\nSecondHand Team}"
    price-change-subject: "${EMAIL_PRICE_CHANGE_SUBJECT:SecondHand - Price Changed on a Favorite Listing}"
    price-change-content: "${EMAIL_PRICE_CHANGE_CONTENT:Hello %s,\nThe listing '%s' in your favorites has changed price from %s to %s.\nCheck it out on SecondHand.}"
    order-confirmation-subject: "${EMAIL_ORDER_CONFIRMATION_SUBJECT:SecondHand - Order Confirmation}"
    sale-notification-subject: "${EMAIL_SALE_NOTIFICATION_SUBJECT:SecondHand - Your Item Has Been Sold!}"
    payment-verification-subject: "${EMAIL_PAYMENT_VERIFICATION_SUBJECT:SecondHand - Payment Verification}"
    payment-verification-content: "${EMAIL_PAYMENT_VERIFICATION_CONTENT:Hello %s, your payment verification code is %s. This code is valid for %d minutes.}"
    agreement:
      subject-prefix: "${EMAIL_AGREEMENT_SUBJECT_PREFIX:SecondHand: }"
      body-footer: "${EMAIL_AGREEMENT_BODY_FOOTER:\n\nOpen Agreements in your account: Profile -> Agreements (or /agreements/all).}"
    order:
      cancelled-subject: "${EMAIL_ORDER_CANCELLED_SUBJECT:SecondHand - Order Cancelled}"
      completed-subject: "${EMAIL_ORDER_COMPLETED_SUBJECT:SecondHand - Order Completed}"
      refunded-subject: "${EMAIL_ORDER_REFUNDED_SUBJECT:SecondHand - Order Refunded}"
      customer-greeting-format: "${EMAIL_ORDER_CUSTOMER_GREETING_FORMAT:Hello %s,}"
      customer-intro-line: "${EMAIL_ORDER_CUSTOMER_INTRO_LINE:Thank you for your purchase! Your order has been confirmed.}"
      customer-order-number-label: "${EMAIL_ORDER_CUSTOMER_ORDER_NUMBER_LABEL:Order Number}"
      customer-status-label: "${EMAIL_ORDER_CUSTOMER_STATUS_LABEL:Status}"
      customer-payment-status-label: "${EMAIL_ORDER_CUSTOMER_PAYMENT_STATUS_LABEL:Payment Status}"
      customer-total-label: "${EMAIL_ORDER_CUSTOMER_TOTAL_LABEL:Total}"
      customer-shipping-address-label: "${EMAIL_ORDER_CUSTOMER_SHIPPING_ADDRESS_LABEL:Shipping Address}"
      customer-items-label: "${EMAIL_ORDER_CUSTOMER_ITEMS_LABEL:Items}"
      customer-item-fallback-title: "${EMAIL_ORDER_CUSTOMER_ITEM_FALLBACK_TITLE:Item}"
      customer-item-line-format: "${EMAIL_ORDER_CUSTOMER_ITEM_LINE_FORMAT:- %s x%d - %s %s}"
      customer-notes-label: "${EMAIL_ORDER_CUSTOMER_NOTES_LABEL:Notes}"
      customer-payment-reference-label: "${EMAIL_ORDER_CUSTOMER_PAYMENT_REFERENCE_LABEL:Payment Reference}"
      customer-closing: "${EMAIL_ORDER_CUSTOMER_CLOSING:Best regards,\nSecondHand Team}"
      seller-greeting-format: "${EMAIL_ORDER_SELLER_GREETING_FORMAT:Hello %s,}"
      seller-intro-line: "${EMAIL_ORDER_SELLER_INTRO_LINE:Great news! Your item(s) have been sold!}"
      seller-order-number-label: "${EMAIL_ORDER_SELLER_ORDER_NUMBER_LABEL:Order Number}"
      seller-total-amount-label: "${EMAIL_ORDER_SELLER_TOTAL_AMOUNT_LABEL:Total Amount}"
      seller-sold-items-label: "${EMAIL_ORDER_SELLER_SOLD_ITEMS_LABEL:Sold Items}"
      seller-shipping-address-label: "${EMAIL_ORDER_SELLER_SHIPPING_ADDRESS_LABEL:Shipping Address}"
      seller-item-fallback-title: "${EMAIL_ORDER_SELLER_ITEM_FALLBACK_TITLE:Item}"
      seller-item-line-format: "${EMAIL_ORDER_SELLER_ITEM_LINE_FORMAT:- %s x%d - %s %s}"
      seller-prep-line: "${EMAIL_ORDER_SELLER_PREP_LINE:Please prepare the item(s) for shipping and contact the buyer if needed.}"
      seller-closing: "${EMAIL_ORDER_SELLER_CLOSING:Thank you for using SecondHand!\n\nBest regards,\nSecondHand Team}"
      cancellation-content-format: "${EMAIL_ORDER_CANCELLATION_CONTENT_FORMAT:Hello %s,\n\nYour order %s has been cancelled.\n}"
      refund-content-format: "${EMAIL_ORDER_REFUND_CONTENT_FORMAT:Hello %s,\n\nYour order %s has been refunded. The refund amount has been credited to your eWallet.\n}"
      completion-content-format: "${EMAIL_ORDER_COMPLETION_CONTENT_FORMAT:Hello %s,\n\nYour order %s has been %s.\n}"
      completion-manual-word: "${EMAIL_ORDER_COMPLETION_MANUAL_WORD:completed}"
      completion-automatic-word: "${EMAIL_ORDER_COMPLETION_AUTOMATIC_WORD:automatically completed}"
    offer:
      received-subject: "${EMAIL_OFFER_RECEIVED_SUBJECT:SecondHand - New Offer Received}"
      counter-received-subject: "${EMAIL_OFFER_COUNTER_RECEIVED_SUBJECT:SecondHand - Counter Offer Received}"
      accepted-subject: "${EMAIL_OFFER_ACCEPTED_SUBJECT:SecondHand - Offer Accepted}"
      rejected-subject: "${EMAIL_OFFER_REJECTED_SUBJECT:SecondHand - Offer Rejected}"
      expired-subject: "${EMAIL_OFFER_EXPIRED_SUBJECT:SecondHand - Offer Expired}"
      completed-subject: "${EMAIL_OFFER_COMPLETED_SUBJECT:SecondHand - Offer Completed}"
      received-headline: "${EMAIL_OFFER_RECEIVED_HEADLINE:You received a new offer.}"
      counter-received-headline: "${EMAIL_OFFER_COUNTER_RECEIVED_HEADLINE:You received a counter offer.}"
      accepted-headline: "${EMAIL_OFFER_ACCEPTED_HEADLINE:Your offer has been accepted.}"
      rejected-headline: "${EMAIL_OFFER_REJECTED_HEADLINE:Your offer has been rejected.}"
      expired-headline: "${EMAIL_OFFER_EXPIRED_HEADLINE:An offer has expired.}"
      completed-headline: "${EMAIL_OFFER_COMPLETED_HEADLINE:The purchase has been completed for this offer.}"
      accepted-next-step-line: "${EMAIL_OFFER_ACCEPTED_NEXT_STEP_LINE:Next step: Complete checkout in the app.}"
      greeting: "${EMAIL_OFFER_GREETING:Hello,}"
      listing-label: "${EMAIL_OFFER_LISTING_LABEL:Listing}"
      quantity-label: "${EMAIL_OFFER_QUANTITY_LABEL:Quantity}"
      total-price-label: "${EMAIL_OFFER_TOTAL_PRICE_LABEL:Total price}"
      unit-price-label: "${EMAIL_OFFER_UNIT_PRICE_LABEL:Unit price}"
      expires-at-label: "${EMAIL_OFFER_EXPIRES_AT_LABEL:Expires at}"
      listing-fallback: "${EMAIL_OFFER_LISTING_FALLBACK:Listing}"
      closing: "${EMAIL_OFFER_CLOSING:Best regards,\nSecondHand Team}"
    follow:
      new-listing-subject-format: "${EMAIL_FOLLOW_NEW_LISTING_SUBJECT_FORMAT:%s %s yeni bir ilan ekledi!}"
      greeting-format: "${EMAIL_FOLLOW_GREETING_FORMAT:Merhaba %s,}"
      seller-intro-format: "${EMAIL_FOLLOW_SELLER_INTRO_FORMAT:Takip ettiginiz satici %s %s yeni bir ilan ekledi:}"
      title-prefix: "${EMAIL_FOLLOW_TITLE_PREFIX:Ilan}"
      price-prefix: "${EMAIL_FOLLOW_PRICE_PREFIX:Fiyat}"
      city-prefix: "${EMAIL_FOLLOW_CITY_PREFIX:Sehir}"
      visit-line: "${EMAIL_FOLLOW_VISIT_LINE:Ilani goruntulemek icin uygulamayi ziyaret edin.}"
      footer-separator: "${EMAIL_FOLLOW_FOOTER_SEPARATOR:---}"
      manage-notification-line: "${EMAIL_FOLLOW_MANAGE_NOTIFICATION_LINE:Bu bildirimleri kapatmak icin satici profilinden bildirim ayarlarinizi guncelleyebilirsiniz.}"
