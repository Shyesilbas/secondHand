# E-posta şablonları (içerik). Sırlar burada tutulmaz; yalnızca app.email.* metinleri.
spring:
  mail:
    host: "${SMTP_HOST:localhost}"
    port: "${SMTP_PORT:2525}"
    username: "${SMTP_USERNAME:}"
    password: "${SMTP_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: "${SMTP_AUTH:false}"
          starttls:
            enable: "${SMTP_STARTTLS:false}"
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  email:
    mock: "${EMAIL_MOCK:true}"
    sender: "${EMAIL_SENDER:secondhand@noreply.com}"
