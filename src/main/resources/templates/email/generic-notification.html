<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #334155; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background-color: #0d9488; padding: 24px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .content { padding: 32px; line-height: 1.6; color: #334155; }
        .content p { margin: 0 0 16px 0; }
        .highlight { font-weight: 600; color: #0d9488; }
        .footer { background-color: #f8fafc; padding: 20px; text-align: center; font-size: 13px; color: #64748b; border-top: 1px solid #e2e8f0; }
        .button { display: inline-block; background-color: #0d9488; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${headerTitle}">Bildirim</h1>
        </div>
        <div class="content">
            <p th:text="#{email.body.hello(${userName})}">Merhaba Kullanıcı,</p>
            <p th:text="${message}">Mesaj içeriği burada yer alacak.</p>
            
            <p th:if="${actionUrl != null}">
                <a th:href="${actionUrl}" class="button" th:text="${actionText != null ? actionText : 'Detayları Gör'}">Detayları Gör</a>
            </p>
            
            <p th:utext="#{email.body.team}">Saygılarımızla,<br>SecondHand Ekibi</p>
        </div>
        <div class="footer">
            &copy; 2026 SecondHand. Tüm hakları saklıdır.
        </div>
    </div>
</body>
</html>
