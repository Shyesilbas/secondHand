<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.03); border: 1px solid #f1f5f9; }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 32px 24px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #ffffff; }
        .content { padding: 36px; line-height: 1.6; color: #334155; }
        .content p { margin: 0 0 16px 0; font-size: 15px; }
        .highlight { font-weight: 700; color: #4f46e5; }
        .footer { background-color: #f8fafc; padding: 24px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #e2e8f0; font-weight: 500; }
        .button { display: inline-block; background-color: #4f46e5; color: #ffffff; text-decoration: none; padding: 12px 28px; border-radius: 10px; font-weight: 600; margin-top: 16px; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.15); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${headerTitle}">Bildirim</h1>
        </div>
        <div class="content">
            <p th:text="#{email.body.hello(${userName})}">Merhaba Kullanıcı,</p>
            <div th:utext="${message}" style="white-space: pre-wrap; font-size: 15px; line-height: 1.6; color: #334155; margin-bottom: 16px;">Mesaj içeriği burada yer alacak.</div>
            
            <p th:if="${actionUrl != null}">
                <a th:href="${actionUrl}" class="button" th:text="${actionText != null ? actionText : 'Detayları Gör'}">Detayları Gör</a>
            </p>
            
            <p style="margin-top: 28px; border-top: 1px solid #f1f5f9; padding-top: 20px;" th:utext="#{email.body.team}">Saygılarımızla,<br>SecondHand Ekibi</p>
        </div>
        <div class="footer">
            &copy; 2026 SecondHand. Tüm hakları saklıdır.
        </div>
    </div>
</body>
</html>
