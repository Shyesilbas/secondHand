spring.application.name=secondHand

#Server
server.port=8080

#DB CONFIG
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

#DATE TIME CONFIG
spring.jackson.date-format=dd/MM/yyyy HH:mm
spring.jackson.time-zone=GMT+3
spring.jackson.locale=tr_TR

#Jackson Hibernate Config
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

#Token
jwt.secretKey=${jwt_secretKey}
jwt.accessToken.expiration=900000
jwt.refreshToken.expiration=604800000
jwt.refreshToken.rememberMeExpiration=2592000000

#Cookie Security Configuration
app.auth.cookie.domain=${COOKIE_DOMAIN:localhost}
app.auth.cookie.secure=${COOKIE_SECURE:false}
app.auth.cookie.same-site=${COOKIE_SAME_SITE:Lax}


#Rate Limiting Configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.auth.requests-per-second=${RATE_LIMIT_AUTH:3}
app.rate-limit.payment.requests-per-second=${RATE_LIMIT_PAYMENT:3}
app.rate-limit.general.requests-per-second=${RATE_LIMIT_GENERAL:10}
app.rate-limit.ai.requests-per-second=${RATE_LIMIT_AI:6}
app.rate-limit.window-size-seconds=${RATE_LIMIT_WINDOW:60}

#Async Configuration
app.async.core-pool-size=${ASYNC_CORE_POOL_SIZE:4}
app.async.max-pool-size=${ASYNC_MAX_POOL_SIZE:10}
app.async.queue-capacity=${ASYNC_QUEUE_CAPACITY:100}
app.async.thread-name-prefix=async-

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control,X-File-Name,Idempotency-Key,X-XSRF-TOKEN}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,X-Total-Count,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After,Idempotency-Key,X-CSRF-TOKEN}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE}
spring.security.oauth2.client.registration.google.redirect-uri=${REDIRECT_URI}

spring.security.oauth2.client.provider.google.issuer-uri=${ISSUER_URI}


# Debug log i�in
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.oauth2.client=DEBUG
logging.level.org.springframework.security.oauth2.core=DEBUG

#Cart Reservation Configuration
app.cart.reservation.enabled=${CART_RESERVATION_ENABLED:true}
app.cart.reservation.timeout-minutes=${CART_RESERVATION_TIMEOUT_MINUTES:15}

#Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Listing Fees
app.listing.creation.fee=50.00
app.listing.fee.tax=18.00

#Showcase Fees
app.showcase.daily.cost=10.00
app.showcase.fee.tax=18.00

# Exchange API
exchange.api.key=${exchangeApiKey}

# Cloudinary API
cloudinary.cloud-name=${cloudinaryCloudName}
cloudinary.api-key=${cloudinaryApiKey}
cloudinary.api-secret=${cloudinarySecretKey}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true


# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_API_MODEL}
gemini.api.base-url=${GEMINI_API_BASE_URL}