# Üretim: SPRING_PROFILES_ACTIVE=prod
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.client: INFO
    org.springframework.security.oauth2.core: INFO

management:
  # Management uçları (prometheus dahil) ayrı portta yayınlanır; bu port yalnızca iç ağdan
  # (Prometheus scrape sunucusu, k8s probe'ları) erişilebilir biçimde firewall/network policy ile
  # kısıtlanmalıdır. 8080 üzerinde public Prometheus endpoint kalmaz.
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
