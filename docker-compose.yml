version: '3.8'


services:
  postgres:
    image: postgres:15-alpine
    container_name: secondhand_postgres_dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: secondhand
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: secondhand_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data
    restart: unless-stopped

volumes:
  pgdata_dev:
  redisdata_dev:
